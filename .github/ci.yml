name: CI pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar Testes
        run: npm test

  lint:
    name: Lint do código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Verificar estilo de código
        run: npm run lint

  test:
    name: Testes (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com coverage
        run: npm test -- --coverage --coverageReporters=lcov,text

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
